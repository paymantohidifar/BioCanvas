[workspace]
name = "biocanvas"
version = "0.1.0"
description = "BioCanvas is a library for biological data analysis and visualization."
authors = ["Payman Tohidifar <payman.tohidifar@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tasks]
test = "pytest tests/"
lint = "ruff check . && ruff format --check ."

[dependencies]
python = "3.11.*"
pandas = ">=3.0.0"       # Upgraded to modern Pandas 3.0 series
numpy = ">=2.2.0"        # Advanced to maintain data structure compatibility
matplotlib = ">=3.10.0"
seaborn = ">=0.13.2"
scikit-learn = ">=1.6.0" 
scipy = ">=1.15.0"       # Upgraded to track Pandas 3.0 C-extensions
tqdm = ">=4.67.0"
jupyter = ">=1.1.0"
pixi-kernel = "*"

[feature.dev.dependencies]
pytest = ">=8.3.0"
yapf = ">=0.43.0"
ruff = ">=0.9.0"

[environments]
default = { features = ["dev"], no-default-feature = false }