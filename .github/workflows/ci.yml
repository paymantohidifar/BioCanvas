name: BioCanvas CI Pipeline

# 1. Define the automation triggers (Events)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 2. Define the execution environment
jobs:
  test-and-lint:
    runs-on: ubuntu-latest # Spawns a clean, free cloud virtual machine

    steps:
      # Step A: Download the repository code onto the runner machine
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step B: Instantiate Locked Pixi Environment
      - name: Instantiate Locked Pixi Environment
        uses: prefix-dev/setup-pixi@v0.8.0
        with:
          pixi-version: v0.67.0
          cache-environment: true
      
      # Step C: Static Code Analysis (Linting)
      - name: Run Ruff Linter
        run: pixi run ruff check .

      # Step D: Enforce Code Style Standards (Formatting)
      - name: Run Ruff Format Check
        run: pixi run ruff format --check src/ tests/

      # Step E: Execute Test Suite
      - name: Execute Test Suite
        run: pixi run pytest tests/